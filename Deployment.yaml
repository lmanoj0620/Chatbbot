apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-demo
  labels:
    app: chatbot-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-demo
  template:
    metadata:
      labels:
        app: chatbot-demo
    spec:
      containers:
      - name: chatbot-demo
        image: replace
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-demo-service
spec:
  type: LoadBalancer
  selector:
    app: chatbot-demo
  ports:
  - port: 80
    targetPort: 8501
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: sisya123.duckdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: chatbot-demo-service
            port:
              number: 80
